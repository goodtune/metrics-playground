services:
  # ==========================================================================
  # APAC Region
  # ==========================================================================

  # --- Workloads ---
  apac-app-1:
    build: ./apps/alert-simulator
    environment:
      - REGION=apac
      - SERVICE_NAME=apac-app-1
      - COMPONENT=workload
      - INSTANCE=apac-app-1
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://apac-otel-1:4318
      - OTEL_EXPORTER_OTLP_METRICS_ENDPOINT=http://apac-victoriametrics:8428/opentelemetry
    ports:
      - "8081:8080"
    depends_on:
      - apac-otel-1
      - apac-victoriametrics
    networks:
      - lab-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  apac-app-2:
    build: ./apps/alert-simulator
    environment:
      - REGION=apac
      - SERVICE_NAME=apac-app-2
      - COMPONENT=workload
      - INSTANCE=apac-app-2
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://apac-otel-2:4318
      - OTEL_EXPORTER_OTLP_METRICS_ENDPOINT=http://apac-victoriametrics:8428/opentelemetry
    ports:
      - "8082:8080"
    depends_on:
      - apac-otel-2
      - apac-victoriametrics
    networks:
      - lab-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  apac-app-3:
    build: ./apps/alert-simulator
    environment:
      - REGION=apac
      - SERVICE_NAME=apac-app-3
      - COMPONENT=workload
      - INSTANCE=apac-app-3
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://apac-otel-3:4318
      - OTEL_EXPORTER_OTLP_METRICS_ENDPOINT=http://apac-victoriametrics:8428/opentelemetry
    ports:
      - "8083:8080"
    depends_on:
      - apac-otel-3
      - apac-victoriametrics
    networks:
      - lab-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- Local OTEL Collectors ---
  apac-otel-1:
    image: otel/opentelemetry-collector-contrib:0.120.0
    user: "0:0"
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./config/apac/otel-1:/etc/otelcol:ro
      - apac_otel_1_data:/var/lib/otelcol
    depends_on:
      - apac-vmagent
      - apac-victorialogs
    networks:
      - lab-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "components"]
      interval: 10s
      timeout: 5s
      retries: 3

  apac-otel-2:
    image: otel/opentelemetry-collector-contrib:0.120.0
    user: "0:0"
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./config/apac/otel-2:/etc/otelcol:ro
      - apac_otel_2_data:/var/lib/otelcol
    depends_on:
      - apac-vmagent
      - apac-victorialogs
    networks:
      - lab-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "components"]
      interval: 10s
      timeout: 5s
      retries: 3

  apac-otel-3:
    image: otel/opentelemetry-collector-contrib:0.120.0
    user: "0:0"
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./config/apac/otel-3:/etc/otelcol:ro
      - apac_otel_3_data:/var/lib/otelcol
    depends_on:
      - apac-vmagent
      - apac-victorialogs
    networks:
      - lab-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "components"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- Regional vmagent ---
  apac-vmagent:
    image: victoriametrics/vmagent:v1.108.1
    command:
      - "-remoteWrite.url=http://apac-victoriametrics:8428/api/v1/write"
      - "-httpListenAddr=:8080"
      - "-opentsdbHTTPListenAddr=:8429"
      - "-promscrape.config=/etc/vmagent/scrape.yaml"
    volumes:
      - ./config/apac/vmagent:/etc/vmagent:ro
      - apac_vmagent_data:/vmagent-data
    depends_on:
      - apac-victoriametrics
    networks:
      - lab-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- Regional VictoriaMetrics ---
  apac-victoriametrics:
    image: victoriametrics/victoria-metrics:v1.108.1
    command:
      - "-storageDataPath=/victoria-metrics-data"
      - "-retentionPeriod=30d"
      - "-httpListenAddr=:8428"
      - "-search.latencyOffset=0s"
      - "-inmemoryDataFlushInterval=0s"
    volumes:
      - apac_vm_data:/victoria-metrics-data
    networks:
      - lab-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8428/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- Regional VictoriaLogs ---
  apac-victorialogs:
    image: victoriametrics/victoria-logs:v1.0.0-victorialogs
    command:
      - "-storageDataPath=/victoria-logs-data"
      - "-retentionPeriod=30d"
      - "-httpListenAddr=:9428"
    volumes:
      - apac_vlogs_data:/victoria-logs-data
    networks:
      - lab-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9428/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- Regional vmalert ---
  apac-vmalert:
    image: victoriametrics/vmalert:v1.108.1
    command:
      - "-datasource.url=http://apac-victoriametrics:8428"
      - "-notifier.url=http://apac-alertmanager:9093"
      - "-rule=/etc/vmalert/*.yaml"
      - "-evaluationInterval=1s"
      - "-rule.evalDelay=0s"
      - "-httpListenAddr=:8880"
    volumes:
      - ./config/apac/vmalert:/etc/vmalert:ro
      - apac_vmalert_data:/vmalert-data
    depends_on:
      - apac-victoriametrics
      - apac-alertmanager
    networks:
      - lab-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8880/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --- Regional Alertmanager ---
  apac-alertmanager:
    image: prom/alertmanager:v0.27.0
    user: "0:0"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager-data"
    ports:
      - "9093:9093"
    volumes:
      - ./config/apac/alertmanager:/etc/alertmanager:ro
      - apac_alertmanager_data:/alertmanager-data
    networks:
      - lab-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

