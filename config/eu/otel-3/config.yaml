extensions:
  file_storage:
    directory: /var/lib/otelcol
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  otlphttp/metrics:
    endpoint: http://eu-vmagent:8429
    sending_queue:
      enabled: true
      storage: file_storage
    retry_on_failure:
      enabled: true
  otlphttp/logs:
    endpoint: http://eu-victorialogs:9428/insert/opentelemetry
    sending_queue:
      enabled: true
      storage: file_storage
    retry_on_failure:
      enabled: true

service:
  extensions: [file_storage, health_check]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/metrics]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/logs]
