groups:
  - name: lab-alerts
    interval: 5s
    rules:
      - alert: LabAlertActive
        expr: max by (region, service, component, instance, alert_id, alert_name, severity) (lab_alert_active == 1)
        for: 0s
        labels:
          routing: regional
        annotations:
          summary: "{{ $labels.alert_name }} active on {{ $labels.instance }}"
          description: "Alert {{ $labels.alert_id }} is currently active in {{ $labels.region }}"
